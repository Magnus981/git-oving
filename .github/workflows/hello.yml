name: CI - Basic checks

on:
  push:
    branches: [ "main", "feature/basic-ci-checks" ]
  pull_request:
    branches: [ "main" ]

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kode fra repoet
        uses: actions/checkout@v4

      - name: Vis hvilken branch som kjøres
        run: |
          echo "Branch: $GITHUB_REF_NAME"
          echo "Commit: $GITHUB_SHA"

      - name: Sjekk at README finnes
        run: |
          if [ -f README.md ]; then
            echo "README.md finnes"
          else
            echo "FEIL: README.md mangler"
            exit 1
          fi

      - name: Vis filer i prosjektet
        run: ls -la

      - name: Ferdig
        run: echo "Basic CI checks fullført"